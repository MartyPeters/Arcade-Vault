<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Donkey Kong 2077</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-orange: #ff9500;
      --neon-cyan: #00ffff;
      --neon-purple: #bc00ff;
      --bg-dark: #050508;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      color: #fff;
    }
    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: auto;
      box-shadow: 0 0 50px rgba(0,0,0,0.5);
    }
    /* CRT & Glitch Filters */
    #crt-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 10;
      opacity: 0.15;
    }
    #glitch-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 11;
      mix-blend-mode: overlay;
      opacity: 0;
    }
    .glitching #glitch-overlay {
      animation: glitch-anim 0.2s infinite;
      opacity: 0.3;
    }
    @keyframes glitch-anim {
      0% { background: rgba(255,0,0,0.1); transform: translate(2px, 1px); }
      50% { background: rgba(0,255,0,0.1); transform: translate(-2px, -1px); }
      100% { background: rgba(0,0,255,0.1); transform: translate(1px, 2px); }
    }

    /* Lobby exit button */
    #lobby-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 100;
    }
    #lobby-btn a {
      display: inline-block;
      text-decoration: none;
      color: var(--neon-cyan);
      border: 1px solid rgba(0, 255, 255, 0.3);
      padding: 8px 16px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      border-radius: 4px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(10px);
      text-shadow: 0 0 10px var(--neon-cyan);
    }
    #lobby-btn a:hover {
      color: #fff;
      border-color: var(--neon-cyan);
      background: rgba(0, 255, 255, 0.2);
      box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
      transform: translateY(-2px);
    }

    /* Touch controls (Cyberpunk Style) */
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 40px;
      width: 100%;
      padding: 0 40px;
      gap: 20px;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      z-index: 20;
    }
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
    }
    .dpad { display: grid; grid-template-columns: repeat(3, 70px); grid-template-rows: repeat(2, 70px); gap: 8px; }
    .btn {
      width: 70px; height: 70px;
      background: rgba(0, 255, 255, 0.05);
      border: 2px solid rgba(0, 255, 255, 0.25);
      border-radius: 12px;
      color: var(--neon-cyan);
      font-size: 28px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      backdrop-filter: blur(5px);
      transition: all 0.1s;
    }
    .btn:active { 
       background: rgba(0, 255, 255, 0.3);
       border-color: var(--neon-cyan);
       box-shadow: 0 0 20px var(--neon-cyan);
    }
    #btn-jump {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: rgba(255, 149, 0, 0.1);
      border: 2px solid rgba(255, 149, 0, 0.4);
      color: var(--neon-orange);
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      font-weight: 900;
      text-shadow: 0 0 10px var(--neon-orange);
    }
    #btn-jump:active {
      background: rgba(255, 149, 0, 0.4);
      border-color: var(--neon-orange);
      box-shadow: 0 0 30px var(--neon-orange);
    }
  </style>
</head>
<body class="loading">

<div id="wrapper">
  <div id="lobby-btn"><a href="../../index.html">RETURN TO HUB</a></div>
  <canvas id="gameCanvas"></canvas>
  <div id="crt-overlay"></div>
  <div id="glitch-overlay"></div>
</div>

<div id="touch-controls">
  <div class="dpad">
    <div></div>
    <div class="btn" id="btn-up">▲</div>
    <div></div>
    <div class="btn" id="btn-left">◀</div>
    <div class="btn" id="btn-down">▼</div>
    <div class="btn" id="btn-right">▶</div>
  </div>
  <div class="btn" id="btn-jump">JUMP</div>
</div>

<script>
'use strict';

// ===================== CORE ENGINE =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, scale;
const BASE_W = 800, BASE_H = 800;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  scale = Math.min(W / BASE_W, H / BASE_H) * 0.9;
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = (BASE_W * scale) + "px";
  canvas.style.height = (BASE_H * scale) + "px";
}
window.addEventListener('resize', resize);
resize();

// ===================== ASSETS & CONSTANTS =====================
const C = {
  orange: '#ff9500',
  cyan: '#00ffff',
  purple: '#bc00ff',
  red: '#ff2244',
  white: '#ffffff',
  bg: '#050510'
};

const HUD_H = 100;
const GAME_H = BASE_H - HUD_H;

// ===================== GAME STATE =====================
let state = 'title'; // title | playing | dead | win | gameover
let score = 0, lives = 3, level = 1, frameCount = 0;
let hiScore = parseInt(localStorage.getItem('dk2077_hi') || '0');
let glitchTimer = 0;

// ===================== FX ENGINE =====================
class ParticleEngine {
  constructor() { this.p = []; }
  spawn(x, y, color, count=10, spd=4) {
    for(let i=0; i<count; i++) {
      const a = Math.random()*Math.PI*2;
      const s = Math.random()*spd;
      this.p.push({
        x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1,
        color, life: 1, dec: 0.01+Math.random()*0.02,
        r: 1+Math.random()*3
      });
    }
  }
  update() {
    for(let i=this.p.length-1; i>=0; i--) {
      const p = this.p[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.dec;
      if(p.life <= 0) this.p.splice(i, 1);
    }
  }
  draw(ctx) {
    ctx.save();
    for(const p of this.p) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 10; ctx.shadowColor = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}
const fx = new ParticleEngine();

// ===================== GAME ENTITIES =====================
class Platform {
  constructor(x, y, w, slant=0, color=C.cyan) {
    this.x = x; this.y = y; this.w = w; this.slant = slant; this.color = color;
  }
  draw(ctx) {
    const lY = this.y + (this.x - (this.x + this.w/2)) * this.slant;
    const rY = this.y + (this.x + this.w - (this.x + this.w/2)) * this.slant;

    // Hard-light glow
    ctx.save();
    ctx.shadowBlur = 20; ctx.shadowColor = this.color;
    ctx.strokeStyle = this.color; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.moveTo(this.x, lY); ctx.lineTo(this.x+this.w, rY); ctx.stroke();
    
    // Sub-lines
    ctx.globalAlpha = 0.3; ctx.lineWidth = 1;
    for(let i=1; i<4; i++) {
       ctx.beginPath(); ctx.moveTo(this.x, lY+i*8); ctx.lineTo(this.x+this.w, rY+i*8); ctx.stroke();
    }
    ctx.restore();
  }
}

class Barrel {
  constructor(x, y, vx) {
    this.x = x; this.y = y; this.vx = vx; this.vy = 0;
    this.r = 15;
    this.rot = 0;
    this.active = true;
  }
  update(platforms) {
    this.vy += 0.5;
    this.x += this.vx; this.y += this.vy;
    this.rot += this.vx * 0.1;

    let onGround = false;
    for(const p of platforms) {
      if(this.x + this.r > p.x && this.x - this.r < p.x + p.w) {
        const py = p.y + (this.x - (p.x + p.w/2)) * p.slant;
        if(this.y + this.r >= py && this.y + this.r <= py + 15 + this.vy) {
          this.y = py - this.r;
          this.vy = 0;
          onGround = true;
          this.vx = (this.vx > 0 ? 1 : -1) * (2 + level*0.5 + Math.abs(p.slant)*10);
        }
      }
    }

    if(this.x < 0 || this.x > BASE_W) this.vx *= -1;
    if(this.y > BASE_H) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.shadowBlur = 15; ctx.shadowColor = C.red;
    ctx.strokeStyle = C.red; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-this.r, 0); ctx.lineTo(this.r, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -this.r); ctx.lineTo(0, this.r); ctx.stroke();
    ctx.restore();
  }
}

const mario = {
  x: 50, y: 700, vx: 0, vy: 0, 
  w: 30, h: 45, onGround: false,
  facing: 1,
  update(platforms, keys) {
    const spd = 5;
    if(keys.ArrowLeft || keys.KeyA) { this.vx = -spd; this.facing = -1; }
    else if(keys.ArrowRight || keys.KeyD) { this.vx = spd; this.facing = 1; }
    else this.vx = 0;

    if((keys.Space || keys.ArrowUp) && this.onGround) {
      this.vy = -12;
      this.onGround = false;
    }

    this.vy += 0.6;
    this.x += this.vx; this.y += this.vy;

    this.onGround = false;
    for(const p of platforms) {
       if(this.x + this.w > p.x && this.x < p.x + p.w) {
         const py = p.y + (this.x + this.w/2 - (p.x + p.w/2)) * p.slant;
         if(this.vy >= 0 && this.y + this.h >= py && this.y + this.h <= py + 10 + this.vy) {
           this.y = py - this.h;
           this.vy = 0;
           this.onGround = true;
         }
       }
    }

    this.x = Math.max(0, Math.min(this.x, BASE_W - this.w));
    if(this.y > BASE_H) triggerDeath();
  },
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x + this.w/2, this.y + this.h/2);
    ctx.scale(this.facing, 1);
    
    // Cyber-Runner Body
    ctx.shadowBlur = 15; ctx.shadowColor = C.cyan;
    ctx.fillStyle = C.cyan;
    ctx.fillRect(-10, -20, 20, 30); // Torso
    ctx.fillStyle = C.white;
    ctx.fillRect(-8, -25, 16, 12); // Head/Helmet
    
    // Visor
    ctx.fillStyle = C.purple;
    ctx.fillRect(2, -22, 10, 4);
    
    // Neon stripes
    ctx.strokeStyle = C.white; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-10, -5); ctx.lineTo(10, -5); ctx.stroke();
    
    ctx.restore();
  }
};

// ===================== GAME LOGIC =====================
let platforms = [];
let barrels = [];
let barrelTimer = 0;

function initLevel() {
  platforms = [
    new Platform(0, 750, 800, 0, C.purple),
    new Platform(50, 630, 700, 0.05),
    new Platform(50, 510, 700, -0.05),
    new Platform(50, 390, 700, 0.05),
    new Platform(50, 270, 700, 0),
    new Platform(300, 150, 200, 0, C.orange) // Goal
  ];
  barrels = [];
  barrelTimer = 100;
  mario.x = 50; mario.y = 700; mario.vx = 0; mario.vy = 0;
  state = 'playing';
}

function triggerDeath() {
  if(state === 'dead') return;
  state = 'dead';
  lives--;
  fx.spawn(mario.x + 15, mario.y + 22, C.red, 30, 8);
  triggerGlitch(30);
  setTimeout(() => {
    if(lives <= 0) state = 'gameover';
    else initLevel();
  }, 1500);
}

function triggerGlitch(duration) {
  glitchTimer = duration;
  document.body.classList.add('glitching');
}

// ===================== INPUT =====================
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function bindTouch(id, code) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[code] = true; }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); keys[code] = false; }, {passive:false});
}
bindTouch('btn-left', 'ArrowLeft');
bindTouch('btn-right', 'ArrowRight');
bindTouch('btn-up', 'ArrowUp');
bindTouch('btn-down', 'ArrowDown');
bindTouch('btn-jump', 'Space');

// ===================== MAIN LOOP =====================
function loop() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  // Background Ambience (Fog)
  const grad = ctx.createRadialGradient(BASE_W/2, BASE_H/2, 0, BASE_W/2, BASE_H/2, BASE_W/2);
  grad.addColorStop(0, 'rgba(0, 255, 255, 0.05)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, BASE_W, BASE_H);

  if(state === 'playing') {
    frameCount++;
    mario.update(platforms, keys);
    
    barrelTimer--;
    if(barrelTimer <= 0) {
      barrels.push(new Barrel(70, 250, 2 + level*0.5));
      barrelTimer = Math.max(40, 120 - level * 10);
    }

    for(let i=barrels.length-1; i>=0; i--) {
      const b = barrels[i];
      b.update(platforms);
      if(!b.active) barrels.splice(i, 1);
      
      // Collision
      const dx = b.x - (mario.x + 15);
      const dy = b.y - (mario.y + 22);
      if(Math.sqrt(dx*dx + dy*dy) < b.r + 15) {
        triggerDeath();
      }
    }

    // Win check
    if(mario.y < 160 && mario.x > 300 && mario.x < 500) {
      state = 'win';
      score += 1000 * level;
      level++;
      setTimeout(initLevel, 2000);
    }
  }

  // Draw entities
  platforms.forEach(p => p.draw(ctx));
  barrels.forEach(b => b.draw(ctx));
  mario.draw(ctx);
  fx.update();
  fx.draw(ctx);

  // Cyber Kong (The Boss)
  ctx.save();
  ctx.translate(90, 220); // Center of boss area
  
  const pulse = Math.sin(frameCount * 0.1) * 0.2 + 1;
  ctx.shadowBlur = 30 * pulse; ctx.shadowColor = C.orange;
  
  // Body - Heavy Industrial Look
  ctx.fillStyle = '#1a1a20';
  ctx.fillRect(-45, -40, 90, 80);
  
  // Glowing Circuitry
  ctx.strokeStyle = C.orange; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(-35, -30); ctx.lineTo(-10, -10); ctx.lineTo(10, -30); ctx.stroke();
  
  // Heat Sinks (Animated)
  for(let i=0; i<4; i++) {
    const hPulse = Math.sin(frameCount * 0.2 + i) * 10;
    ctx.fillStyle = i%2 === 0 ? C.orange : '#442200';
    ctx.fillRect(-55, -30 + i*15, 10, 8); // Left
    ctx.fillRect(45, -30 + i*15, 10, 8); // Right
  }
  
  // Bionic Arms
  ctx.fillStyle = '#333';
  ctx.fillRect(-65, 0, 20, 40);
  ctx.fillRect(45, 0, 20, 40);
  
  // Head
  ctx.fillStyle = '#111';
  ctx.fillRect(-25, -65, 50, 30);
  
  // Scanner Eyes
  ctx.fillStyle = C.orange;
  const scanX = Math.sin(frameCount * 0.05) * 15;
  ctx.fillRect(-20 + scanX, -60, 10, 5); // Scanning left eye
  ctx.fillRect(10 + scanX, -60, 10, 5); // Scanning right eye
  
  ctx.restore();

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.8)';
  ctx.fillRect(0, 0, BASE_W, HUD_H);
  ctx.fillStyle = C.cyan;
  ctx.font = 'bold 24px Orbitron';
  ctx.fillText(`SCORE: ${String(score).padStart(6, '0')}`, 30, 45);
  ctx.fillText(`LEVEL: ${level}`, 30, 80);
  ctx.textAlign = 'right';
  ctx.fillText(`LIVES: ${'⚡'.repeat(lives)}`, BASE_W - 30, 45);
  ctx.fillText(`BEST: ${hiScore}`, BASE_W - 30, 80);

  // Overlays
  if(state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.9)';
    ctx.fillRect(0,0,BASE_W, BASE_H);
    ctx.fillStyle = C.red;
    ctx.textAlign = 'center';
    ctx.font = 'bold 60px Orbitron';
    ctx.fillText('CONNECTION LOST', BASE_W/2, BASE_H/2);
    ctx.font = '20px Share Tech Mono';
    ctx.fillStyle = C.white;
    ctx.fillText('PRESS R TO RELOAD SYSTEM', BASE_W/2, BASE_H/2 + 50);
  }

  if(glitchTimer > 0) {
    glitchTimer--;
    if(glitchTimer <= 0) document.body.classList.remove('glitching');
  }

  requestAnimationFrame(loop);
}

initLevel();
requestAnimationFrame(loop);

window.addEventListener('keydown', e => {
  if(e.code === 'KeyR' && state === 'gameover') {
    score = 0; level = 1; lives = 3;
    initLevel();
  }
});

</script>
</body>
</html>
