<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcade Vault 🕹️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/hub.css">
</head>
<body>
  <canvas id="bgCanvas"></canvas>

  <div class="vault-container">
    <header>
      <div class="vault-logo">
        <span class="logo-icon">🕹️</span>
        <div>
          <h1>ARCADE VAULT</h1>
          <p class="tagline">YOUR GAME COLLECTION</p>
        </div>
      </div>
    </header>

    <div class="games-grid">
      {% for game in games %}
      <a class="game-card" href="/play/{{ game.id }}/" style="--card-color: {{ game.color }}; --card-glow: {{ game.glow }};">
        <div class="card-glow"></div>
        <div class="card-icon">{{ game.icon }}</div>
        <div class="card-info">
          <h2>{{ game.title }}</h2>
          <p>{{ game.description }}</p>
        </div>
        <div class="play-btn">PLAY ▶</div>
      </a>
      {% endfor %}
    </div>

    <footer>
      <p>🎮 <span id="gameCount">{{ games|length }}</span> game{{ 's' if games|length != 1 }} in the vault</p>
    </footer>
  </div>

  <script>
    // Animated starfield background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    for (let i = 0; i < 150; i++) {
      stars.push({
        x: Math.random() * window.innerWidth,
        y: Math.random() * window.innerHeight,
        r: Math.random() * 1.5 + 0.3,
        speed: Math.random() * 0.4 + 0.1,
        twinkle: Math.random() * Math.PI * 2,
      });
    }

    function animateBg() {
      ctx.fillStyle = '#000a14';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      stars.forEach(s => {
        s.y += s.speed;
        s.twinkle += 0.03;
        if (s.y > canvas.height) { s.y = 0; s.x = Math.random() * canvas.width; }
        ctx.globalAlpha = 0.4 + Math.sin(s.twinkle) * 0.35;
        ctx.fillStyle = '#ffffff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      requestAnimationFrame(animateBg);
    }
    animateBg();
  </script>
</body>
</html>
