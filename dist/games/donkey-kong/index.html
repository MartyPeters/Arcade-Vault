<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Donkey Kong 2077</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --neon-orange: #ff9500;
      --neon-cyan: #00ffff;
      --neon-purple: #bc00ff;
      --bg-dark: #050510;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Share Tech Mono', monospace;
      overflow: hidden;
      color: #fff;
    }
    #wrapper {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      max-width: 100%;
      max-height: 100%;
      image-rendering: auto;
      box-shadow: 0 0 100px rgba(0,0,0,0.8);
      background: #000;
    }
    /* CRT & Glitch Filters */
    #crt-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                  linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
      background-size: 100% 4px, 3px 100%;
      pointer-events: none;
      z-index: 10;
    }
    #glitch-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 11;
      mix-blend-mode: color-dodge;
      opacity: 0;
    }
    .glitching #glitch-overlay {
      animation: glitch-anim 0.15s infinite;
      opacity: 0.4;
    }
    @keyframes glitch-anim {
      0% { background: rgba(255,0,255,0.1); transform: translate(4px, 2px) skewX(5deg); }
      50% { background: rgba(0,255,255,0.1); transform: translate(-4px, -2px) skewX(-5deg); }
      100% { background: rgba(0,0,255,0.1); transform: translate(2px, 4px) skewX(2deg); }
    }

    /* Modern UI */
    #lobby-btn {
      position: absolute;
      top: 30px;
      left: 30px;
      z-index: 100;
    }
    #lobby-btn a {
      display: inline-block;
      text-decoration: none;
      color: var(--neon-cyan);
      border: 1px solid var(--neon-cyan);
      padding: 10px 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 3px;
      border-radius: 2px;
      transition: all 0.4s;
      background: rgba(0, 255, 255, 0.05);
      backdrop-filter: blur(8px);
      text-transform: uppercase;
    }
    #lobby-btn a:hover {
      background: var(--neon-cyan);
      color: #000;
      box-shadow: 0 0 30px var(--neon-cyan);
    }

    /* High-Tech Touch Controls */
    #touch-controls {
      display: none;
      position: absolute;
      bottom: 50px;
      width: 100%;
      padding: 0 60px;
      justify-content: space-between;
      align-items: center;
      user-select: none;
      z-index: 20;
    }
    @media (pointer: coarse) {
      #touch-controls { display: flex; }
    }
    .grid-ctrl { display: grid; grid-template-columns: repeat(3, 85px); grid-template-rows: repeat(2, 85px); gap: 12px; }
    .ctrl-btn {
      width: 85px; height: 85px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(0, 255, 255, 0.2);
      border-radius: 4px;
      color: var(--neon-cyan);
      font-size: 32px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
      transition: 0.1s;
    }
    .ctrl-btn:active { 
       background: rgba(0, 255, 255, 0.25);
       border-color: var(--neon-cyan);
       box-shadow: 0 0 20px var(--neon-cyan);
    }
    #jump-trigger {
      width: 120px; height: 120px;
      border-radius: 50%;
      background: rgba(255, 149, 0, 0.05);
      border: 2px solid var(--neon-orange);
      color: var(--neon-orange);
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      text-shadow: 0 0 10px var(--neon-orange);
    }
    #jump-trigger:active {
      background: var(--neon-orange);
      color: #000;
      box-shadow: 0 0 40px var(--neon-orange);
    }
  </style>
</head>
<body>

<div id="wrapper">
  <div id="lobby-btn"><a href="../../index.html">EXIT LOBBY</a></div>
  <canvas id="gameCanvas"></canvas>
  <div id="crt-overlay"></div>
  <div id="glitch-overlay"></div>
</div>

<div id="touch-controls">
  <div class="grid-ctrl">
    <div></div>
    <div class="ctrl-btn" id="btn-up">▲</div>
    <div></div>
    <div class="ctrl-btn" id="btn-left">◀</div>
    <div class="ctrl-btn" id="btn-down">▼</div>
    <div class="ctrl-btn" id="btn-right">▶</div>
  </div>
  <div class="ctrl-btn" id="jump-trigger">JUMP</div>
</div>

<script>
'use strict';

// ===================== CORE ENGINE =====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let W, H, scale;
const BASE_W = 1000, BASE_H = 1000;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  scale = Math.min(W / BASE_W, H / BASE_H) * 0.95;
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = (BASE_W * scale) + "px";
  canvas.style.height = (BASE_H * scale) + "px";
}
window.addEventListener('resize', resize);
resize();

const C = {
  orange: '#ff9500',
  cyan: '#00ffff',
  purple: '#bc00ff',
  red: '#ff2244',
  white: '#ffffff',
  bg: '#050512'
};

// ===================== SYSTEMS =====================
class FX {
  constructor() { this.p = []; }
  spawn(x, y, color, count=15, spd=6) {
    for(let i=0; i<count; i++) {
      this.p.push({
        x, y, vx:(Math.random()-0.5)*spd, vy:(Math.random()-0.5)*spd,
        color, life: 1, dec: 0.01+Math.random()*0.02, r: 2+Math.random()*3
      });
    }
  }
  update() {
    for(let i=this.p.length-1; i>=0; i--) {
      const p = this.p[i];
      p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= p.dec;
      if(p.life <= 0) this.p.splice(i, 1);
    }
  }
  draw(ctx) {
    ctx.save();
    for(const p of this.p) {
      ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.shadowBlur = 10; ctx.shadowColor = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}
const particles = new FX();

// ===================== ENTITIES =====================
class Platform {
  constructor(x, y, w, slant, color=C.cyan) {
    this.x = x; this.y = y; this.w = w; this.slant = slant; this.color = color;
  }
  getY(x) {
    return this.y + (x - (this.x + this.w / 2)) * this.slant;
  }
  draw(ctx) {
    const lY = this.getY(this.x), rY = this.getY(this.x + this.w);
    ctx.save();
    ctx.shadowBlur = 15; ctx.shadowColor = this.color;
    ctx.strokeStyle = this.color; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(this.x, lY); ctx.lineTo(this.x + this.w, rY); ctx.stroke();
    // Industrial Grid
    ctx.globalAlpha = 0.2; ctx.lineWidth = 2;
    for(let i=1; i<5; i++) {
       ctx.beginPath(); ctx.moveTo(this.x, lY+i*8); ctx.lineTo(this.x+this.w, rY+i*8); ctx.stroke();
    }
    ctx.restore();
  }
}

class Ladder {
  constructor(x, yTop, yBot) {
    this.x = x; this.yTop = yTop; this.yBot = yBot;
    this.color = C.white;
  }
  draw(ctx) {
    ctx.save();
    ctx.shadowBlur = 15; ctx.shadowColor = this.color;
    ctx.strokeStyle = this.color; ctx.lineWidth = 4;
    ctx.globalAlpha = 0.8; // Increased opacity
    ctx.beginPath();
    ctx.moveTo(this.x - 12, this.yTop); ctx.lineTo(this.x - 12, this.yBot);
    ctx.moveTo(this.x + 12, this.yTop); ctx.lineTo(this.x + 12, this.yBot);
    ctx.stroke();
    // Inner Glow
    ctx.globalAlpha = 0.2; ctx.lineWidth = 10;
    ctx.stroke();
    // Rungs
    ctx.globalAlpha = 0.6; ctx.lineWidth = 2;
    for(let ry = this.yTop + 10; ry < this.yBot; ry += 20) {
      ctx.beginPath(); ctx.moveTo(this.x - 12, ry); ctx.lineTo(this.x + 12, ry); ctx.stroke();
    }
    ctx.restore();
  }
}

class Barrel {
  constructor(x, y, vx) {
    this.x = x; this.y = y; this.vx = vx; this.vy = 0;
    this.r = 18; this.rot = 0; this.active = true;
  }
  update(platforms) {
    this.vy += 0.5; // Gravity
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.vx * 0.15;

    let grounded = false;
    for(const p of platforms) {
      if(this.x > p.x && this.x < p.x + p.w) {
         const py = p.getY(this.x);
         if(this.y + this.r >= py && this.y + this.r <= py + 20 + this.vy) {
            this.y = py - this.r;
            this.vy = 0;
            grounded = true;
            // Roll downhill physics
            const rollAccel = p.slant * 5.0; // Acceleration based on slope
            this.vx += rollAccel;
            this.vx *= 0.98; // Friction
         }
      }
    }
    
    if(!grounded && Math.abs(this.vy) < 0.1) {
       // Just rolled off an edge
    }

    if(this.x < -20 || this.x > BASE_W + 20 || this.y > BASE_H) this.active = false;
  }
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.shadowBlur = 20; ctx.shadowColor = C.red;
    ctx.strokeStyle = C.red; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, this.r, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-this.r, 0); ctx.lineTo(this.r, 0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, -this.r); ctx.lineTo(0, this.r); ctx.stroke();
    ctx.restore();
  }
}

const runner = {
  x: 100, y: 880, vx: 0, vy: 0, w: 40, h: 60,
  onGround: false, onLadder: false, climbing: false,
  facing: 1, anim: 0,
  update(platforms, ladders, keys) {
    const spd = 6, climbSpd = 4;
    
    // Ladder detection
    let nearLadder = null;
    for(const l of ladders) {
      if(Math.abs(this.x + this.w/2 - l.x) < 30 && this.y + this.h > l.yTop && this.y < l.yBot) {
        nearLadder = l; break;
      }
    }

    if(nearLadder && (keys.ArrowUp || keys.ArrowDown || this.climbing)) {
      this.climbing = true;
      this.vx = 0;
      this.x = nearLadder.x - this.w / 2;
      if(keys.ArrowUp) this.vy = -climbSpd;
      else if(keys.ArrowDown) this.vy = climbSpd;
      else this.vy = 0;
      
      if(this.y + this.h < nearLadder.yTop - 10 || this.y > nearLadder.yBot + 10) this.climbing = false;
    } else {
      this.climbing = false;
      if(keys.ArrowLeft) { this.vx = -spd; this.facing = -1; }
      else if(keys.ArrowRight) { this.vx = spd; this.facing = 1; }
      else this.vx = 0;

      if(keys.Space && this.onGround) {
        this.vy = -14; this.onGround = false;
      }
      this.vy += 0.7; // Global Gravity
    }

    this.x += this.vx;
    this.y += this.vy;

    if(!this.climbing) {
      this.onGround = false;
      for(const p of platforms) {
        if(this.x + this.w > p.x && this.x < p.x + p.w) {
          const py = p.getY(this.x + this.w/2);
          if(this.vy >= 0 && this.y + this.h >= py && this.y + this.h <= py + 15 + this.vy) {
            this.y = py - this.h;
            this.vy = 0;
            this.onGround = true;
          }
        }
      }
    } else {
        this.onGround = false;
    }

    this.x = Math.max(0, Math.min(this.x, BASE_W - this.w));
    if(this.y > BASE_H) triggerDeath();
    
    if(this.vx !== 0) this.anim += 0.15;
  },
  draw(ctx) {
    ctx.save();
    ctx.translate(this.x + this.w / 2, this.y + this.h / 2);
    ctx.scale(this.facing, 1);
    
    // Runner Visuals (High-Fidelity Vector)
    const bob = Math.sin(this.anim) * 3;
    
    // Legs
    ctx.strokeStyle = C.cyan; ctx.lineWidth = 4;
    ctx.beginPath(); 
    ctx.moveTo(-10, 10); ctx.lineTo(-15, 30 + bob); // Front leg
    ctx.moveTo(10, 10); ctx.lineTo(15, 30 - bob);  // Back leg
    ctx.stroke();

    // Body
    ctx.shadowBlur = 20; ctx.shadowColor = C.cyan;
    ctx.fillStyle = C.cyan;
    ctx.fillRect(-15, -20 + bob, 30, 35);
    
    // Armor Detail
    ctx.strokeStyle = C.white; ctx.lineWidth = 1;
    ctx.strokeRect(-12, -18 + bob, 24, 10);
    
    // Head / Helm
    ctx.fillStyle = '#111';
    ctx.fillRect(-12, -45 + bob, 24, 25);
    
    // Visor
    ctx.fillStyle = C.purple;
    ctx.shadowBlur = 10; ctx.shadowColor = C.purple;
    ctx.fillRect(0, -40 + bob, 15, 6);
    
    ctx.restore();
  }
};

// ===================== BOSS =====================
const boss = {
  x: 100, y: 150,
  draw(ctx, frame) {
    ctx.save();
    ctx.translate(this.x, this.y);
    const p = Math.sin(frame * 0.1) * 0.1 + 1;
    ctx.shadowBlur = 40 * p; ctx.shadowColor = C.orange;
    
    // Mecha-Body
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(-60, -50, 120, 100);
    
    // Core Reactor
    ctx.fillStyle = C.orange;
    ctx.beginPath(); ctx.arc(0, 0, 20 * p, 0, Math.PI*2); ctx.fill();
    
    // Heat Sinks
    for(let i=0; i<4; i++) {
        const h = Math.sin(frame*0.2 + i)*15;
        ctx.fillStyle = i%2===0 ? C.orange : '#331100';
        ctx.fillRect(-75, -40 + i*20, 15, 12);
        ctx.fillRect(60, -40 + i*20, 15, 12);
    }
    
    // Head
    ctx.fillStyle = '#050505';
    ctx.fillRect(-35, -85, 70, 35);
    ctx.fillStyle = C.orange;
    const s = Math.sin(frame*0.05)*20;
    ctx.fillRect(s-5, -80, 10, 5); // Scanning eye
    
    ctx.restore();
  }
};

// ===================== CORE LOOP =====================
let score = 0, lives = 3, level = 1, frameCount = 0;
let platforms = [], ladders = [], barrels = [];
let barrelTimer = 0;
let state = 'playing';

function initLevel() {
  platforms = [
    new Platform(0, 950, 1000, 0, C.purple),      // Ground
    new Platform(100, 800, 800, 0.04),            // Level 1
    new Platform(100, 650, 800, -0.04),           // Level 2
    new Platform(100, 500, 800, 0.04),            // Level 3
    new Platform(100, 350, 800, -0.04),           // Level 4
    new Platform(100, 200, 400, 0, C.orange),     // Boss Platform
    new Platform(600, 150, 300, 0, C.purple)      // Goal
  ];
  
  ladders = [
    new Ladder(800, 810, 950),
    new Ladder(200, 660, 810),
    new Ladder(800, 510, 660),
    new Ladder(200, 360, 510),
    new Ladder(450, 210, 360),
    new Ladder(750, 160, 350)
  ];

  barrels = [];
  barrelTimer = 100;
  runner.x = 100; runner.y = 880; runner.vx = 0; runner.vy = 0; runner.climbing = false;
  state = 'playing';
}

function triggerDeath() {
  if(state === 'dead') return;
  state = 'dead'; lives--;
  particles.spawn(runner.x + 20, runner.y + 30, C.red, 40, 10);
  document.body.classList.add('glitching');
  setTimeout(() => {
    document.body.classList.remove('glitching');
    if(lives <= 0) state = 'gameover';
    else initLevel();
  }, 1500);
}

const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; if(e.code==='KeyR' && state==='gameover') { score=0; level=1; lives=3; initLevel(); } });
window.addEventListener('keyup', e => { keys[e.code] = false; });

function bind(id, code) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); keys[code]=true; }, {passive:false});
  el.addEventListener('touchend', e => { e.preventDefault(); keys[code]=false; }, {passive:false});
}
bind('btn-left', 'ArrowLeft'); bind('btn-right', 'ArrowRight');
bind('btn-up', 'ArrowUp'); bind('btn-down', 'ArrowDown');
bind('jump-trigger', 'Space');

function loop() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  
  // Cyber-Atmosphere
  const g = ctx.createRadialGradient(BASE_W/2, BASE_H/2, 0, BASE_W/2, BASE_H/2, BASE_W);
  g.addColorStop(0, 'rgba(0, 255, 255, 0.05)'); g.addColorStop(1, 'transparent');
  ctx.fillStyle = g; ctx.fillRect(0,0,BASE_W, BASE_H);

  if(state === 'playing') {
    frameCount++;
    runner.update(platforms, ladders, keys);
    
    barrelTimer--;
    if(barrelTimer <= 0) {
      barrels.push(new Barrel(120, 180, 2 + level*0.5));
      barrelTimer = Math.max(30, 110 - level * 10);
    }

    for(let i=barrels.length-1; i>=0; i--) {
      const b = barrels[i];
      b.update(platforms);
      if(!b.active) { barrels.splice(i, 1); score += 50; }
      else {
        // Collision
        const dx = b.x - (runner.x + 20), dy = b.y - (runner.y + 30);
        if(Math.sqrt(dx*dx + dy*dy) < 30) triggerDeath();
      }
    }

    if(runner.y < 150 && runner.x > 600) {
      state = 'win'; level++; score += 2000;
      setTimeout(initLevel, 2000);
    }
  }

  platforms.forEach(p => p.draw(ctx));
  ladders.forEach(l => l.draw(ctx));
  boss.draw(ctx, frameCount);
  barrels.forEach(b => b.draw(ctx));
  runner.draw(ctx);
  particles.update(); particles.draw(ctx);

  // HUD
  ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillRect(0,0,BASE_W, 100);
  ctx.fillStyle = C.cyan; ctx.font = 'bold 36px Orbitron';
  ctx.fillText(`SCORE: ${String(score).padStart(6, '0')}`, 40, 60);
  ctx.textAlign = 'right';
  ctx.fillText(`LIVES: ${'⚡'.repeat(lives)} | BEST: ${localStorage.getItem('dk2077_hi') || 0}`, BASE_W - 40, 60);

  if(state === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.95)'; ctx.fillRect(0,0,BASE_W, BASE_H);
    ctx.fillStyle = C.red; ctx.textAlign = 'center'; ctx.font = '90px Orbitron';
    ctx.fillText('NETWORK DOWN', BASE_W/2, BASE_H/2);
    ctx.font = '30px Share Tech Mono'; ctx.fillStyle = '#fff';
    ctx.fillText('RELOAD SYSTEM (R)', BASE_W/2, BASE_H/2 + 80);
    if(score > (localStorage.getItem('dk2077_hi')||0)) localStorage.setItem('dk2077_hi', score);
  }

  requestAnimationFrame(loop);
}

initLevel();
requestAnimationFrame(loop);

</script>
</body>
</html>
