<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders 2077</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="gameWrapper">
    <canvas id="gameCanvas"></canvas>

    <!-- Name entry screen -->
    <div id="nameScreen">
      <div class="ns-title">
        <span class="ns-main">SPACE INVADERS</span>
        <span class="ns-sub">2077</span>
      </div>
      <div class="ns-form">
        <label for="playerName">PILOT CALLSIGN</label>
        <input type="text" id="playerName" maxlength="12" placeholder="ENTER NAME" autocomplete="off" spellcheck="false">
        <div class="btn-group">
          <button id="startBtn">LAUNCH ▶</button>
          <a href="../../index.html" class="lobby-link">VAULT LOBBY</a>
        </div>
        <p class="ns-hint">ARROWS / WASD to move &nbsp;·&nbsp; SPACE to fire &nbsp;·&nbsp; Q to switch weapon</p>
      </div>
    </div>

    <!-- Transparent play button shown over the canvas menu/game-over screens -->
    <div id="playOverlay" class="hidden">
      <button id="playBtn">▶ LAUNCH</button>
      <a href="../../index.html" id="lobbyBtn">LOBBY</a>
    </div>
  </div>

  <script src="js/constants.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/entities.js"></script>
  <script src="js/enemies.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
