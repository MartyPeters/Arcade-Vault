<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Donkey Kong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Courier New', monospace;
    }
    #hud {
      color: #fff;
      font-size: 18px;
      margin-bottom: 8px;
      display: flex;
      gap: 40px;
      letter-spacing: 2px;
    }
    #hud span { color: #FFD700; }
    canvas {
      border: 3px solid #FFD700;
      background: #0d0d1a;
      display: block;
    }
    #message {
      color: #FFD700;
      font-size: 28px;
      margin-top: 12px;
      letter-spacing: 3px;
      min-height: 36px;
      text-align: center;
    }
    #controls {
      color: #888;
      font-size: 13px;
      margin-top: 8px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div id="hud">
    SCORE: <span id="score">0</span>
    &nbsp;&nbsp;&nbsp;
    LIVES: <span id="lives">3</span>
    &nbsp;&nbsp;&nbsp;
    LEVEL: <span id="level">1</span>
  </div>
  <canvas id="gameCanvas" width="560" height="520"></canvas>
  <div id="message">PRESS ENTER TO START</div>
  <div id="controls">Arrow Keys / WASD: Move &amp; Jump &nbsp;|&nbsp; ENTER: Start/Restart</div>

  <script>
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;

  // ── Colour palette ──────────────────────────────────────────────
  const C = {
    platform:  '#8B4513',
    platTop:   '#CD853F',
    ladder:    '#DAA520',
    ladderRung:'#FFD700',
    mario:     '#FF4500',
    marioPants:'#1E90FF',
    marioCap:  '#FF0000',
    marioSkin: '#FFDAB9',
    dk:        '#8B4513',
    dkFur:     '#D2691E',
    barrel:    '#8B4513',
    barrelBand:'#FFD700',
    princess:  '#FF69B4',
    heart:     '#FF1493',
    hammer:    '#888',
    sparks:    '#FF6600',
  };

  // ── Game state ───────────────────────────────────────────────────
  let state = 'title'; // title | playing | dead | win | gameover
  let score = 0;
  let lives = 3;
  let level = 1;
  let frameCount = 0;

  // ── Platform layout ──────────────────────────────────────────────
  // Each platform: { x, y, w, slant } — slant tilts the surface
  function buildLevel(lvl) {
    const tilt = lvl === 1 ? 0.045 : lvl === 2 ? 0.06 : 0.07;
    return [
      // Ground
      { x: 0,   y: 490, w: W,   slant: 0 },
      // Floor 1
      { x: 20,  y: 400, w: W-40, slant: tilt },
      // Floor 2
      { x: 20,  y: 310, w: W-40, slant: -tilt },
      // Floor 3
      { x: 20,  y: 220, w: W-40, slant: tilt },
      // Floor 4 (DK level)
      { x: 20,  y: 130, w: W-40, slant: 0 },
    ];
  }

  // Ladders: { x, yTop, yBot }
  function buildLadders() {
    return [
      { x: 80,  yTop: 400, yBot: 490 },
      { x: 400, yTop: 400, yBot: 490 },
      { x: 200, yTop: 310, yBot: 400 },
      { x: 450, yTop: 310, yBot: 400 },
      { x: 100, yTop: 220, yBot: 310 },
      { x: 380, yTop: 220, yBot: 310 },
      { x: 250, yTop: 130, yBot: 220 },
    ];
  }

  let platforms = buildLevel(level);
  let ladders   = buildLadders();

  // ── Helper: get platform surface Y at given x ────────────────────
  function platY(plat, x) {
    const cx = plat.x + plat.w / 2;
    return plat.y + (x - cx) * plat.slant;
  }

  function getPlatformBelow(px, py, pw) {
    // Find the highest platform whose surface is just below py
    let best = null;
    let bestY = Infinity;
    for (const p of platforms) {
      if (px + pw < p.x || px > p.x + p.w) continue;
      const sy = platY(p, px + pw / 2);
      if (sy >= py - 2 && sy < bestY) {
        best = p;
        bestY = sy;
      }
    }
    return best ? { plat: best, sy: bestY } : null;
  }

  // ── Mario ────────────────────────────────────────────────────────
  const MARIO_W = 20, MARIO_H = 24;
  let mario = {};

  function resetMario() {
    mario = {
      x: 40, y: 460,
      vx: 0, vy: 0,
      onGround: false,
      onLadder: false,
      facingRight: true,
      animFrame: 0,
      animTimer: 0,
      dead: false,
      deathTimer: 0,
    };
  }

  // ── Donkey Kong ──────────────────────────────────────────────────
  let dk = { x: 60, y: 88, animTimer: 0, shakeTimer: 0 };

  // ── Princess ─────────────────────────────────────────────────────
  let princess = { x: W - 60, y: 100 };

  // ── Barrels ──────────────────────────────────────────────────────
  let barrels = [];
  let barrelTimer = 0;
  const BARREL_INTERVAL_BASE = 160; // frames between spawns

  function spawnBarrel() {
    barrels.push({
      x: dk.x + 40,
      y: dk.y + 20,
      vx: 1.8 + level * 0.3,
      vy: 0,
      onGround: false,
      rolling: true,
      animTimer: 0,
      animFrame: 0,
    });
  }

  // ── Input ────────────────────────────────────────────────────────
  const keys = {};
  window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Enter') handleEnter();
    // prevent page scroll
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) {
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  function handleEnter() {
    if (state === 'title' || state === 'gameover') {
      score = 0; lives = 3; level = 1;
      startLevel();
    } else if (state === 'dead') {
      startLevel();
    } else if (state === 'win') {
      level = Math.min(level + 1, 3);
      startLevel();
    }
  }

  function startLevel() {
    platforms = buildLevel(level);
    ladders   = buildLadders();
    barrels   = [];
    barrelTimer = 80;
    frameCount  = 0;
    dk = { x: 60, y: 88, animTimer: 0, shakeTimer: 0 };
    princess = { x: W - 60, y: 100 };
    resetMario();
    state = 'playing';
    updateHUD();
  }

  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('lives').textContent = lives;
    document.getElementById('level').textContent = level;
    document.getElementById('message').textContent = '';
  }

  // ── Physics constants ────────────────────────────────────────────
  const GRAVITY   = 0.45;
  const JUMP_V    = -9.5;
  const WALK_SPD  = 2.2;
  const CLIMB_SPD = 2.0;

  // ── Main update ──────────────────────────────────────────────────
  function update() {
    if (state !== 'playing') return;
    frameCount++;

    // Death animation
    if (mario.dead) {
      mario.deathTimer++;
      if (mario.deathTimer > 90) {
        lives--;
        if (lives <= 0) {
          state = 'gameover';
          document.getElementById('message').textContent = 'GAME OVER — ENTER TO RETRY';
          document.getElementById('lives').textContent = 0;
        } else {
          state = 'dead';
          document.getElementById('message').textContent = 'ENTER TO CONTINUE';
          document.getElementById('lives').textContent = lives;
        }
      }
      return;
    }

    updateMario();
    updateBarrels();
    checkCollisions();
    spawnBarrels();
  }

  function updateMario() {
    const left  = keys['ArrowLeft']  || keys['KeyA'];
    const right = keys['ArrowRight'] || keys['KeyD'];
    const up    = keys['ArrowUp']    || keys['KeyW'];
    const down  = keys['ArrowDown']  || keys['KeyS'];
    const jump  = keys['Space']      || keys['ArrowUp'] || keys['KeyW'];

    // Check if on ladder
    mario.onLadder = false;
    for (const lad of ladders) {
      const lx = lad.x;
      if (mario.x + MARIO_W > lx - 8 && mario.x < lx + 8 &&
          mario.y + MARIO_H > lad.yTop && mario.y < lad.yBot) {
        mario.onLadder = true;
        break;
      }
    }

    if (mario.onLadder && (up || down)) {
      mario.vy = down ? CLIMB_SPD : -CLIMB_SPD;
      mario.vx = 0;
      if (up || down) {
        mario.animTimer++;
        if (mario.animTimer > 8) { mario.animFrame ^= 1; mario.animTimer = 0; }
      }
    } else {
      // Horizontal movement
      mario.vx = right ? WALK_SPD : left ? -WALK_SPD : 0;
      if (right) mario.facingRight = true;
      if (left)  mario.facingRight = false;

      // Jump
      if (jump && mario.onGround) {
        mario.vy = JUMP_V;
        mario.onGround = false;
      }

      // Gravity
      mario.vy += GRAVITY;
      if (mario.vy > 12) mario.vy = 12;

      // Walk animation
      if (mario.vx !== 0 && mario.onGround) {
        mario.animTimer++;
        if (mario.animTimer > 6) { mario.animFrame = (mario.animFrame + 1) % 4; mario.animTimer = 0; }
      } else if (mario.vx === 0) {
        mario.animFrame = 0;
      }
    }

    mario.x += mario.vx;
    mario.y += mario.vy;

    // Wall clamp
    if (mario.x < 0) mario.x = 0;
    if (mario.x + MARIO_W > W) mario.x = W - MARIO_W;

    // Platform collision (only falling / standing)
    mario.onGround = false;
    if (mario.vy >= 0) {
      const res = getPlatformBelow(mario.x, mario.y + MARIO_H, MARIO_W);
      if (res && mario.y + MARIO_H <= res.sy + mario.vy + 2) {
        mario.y = res.sy - MARIO_H;
        mario.vy = 0;
        mario.onGround = true;
      }
    }

    // Fall off bottom → die
    if (mario.y > H + 40) {
      triggerDeath();
    }
  }

  function updateBarrels() {
    for (let i = barrels.length - 1; i >= 0; i--) {
      const b = barrels[i];

      b.vy += GRAVITY * 0.9;
      if (b.vy > 12) b.vy = 12;

      b.x += b.vx;
      b.y += b.vy;

      // Roll animation
      b.animTimer++;
      if (b.animTimer > 4) { b.animFrame = (b.animFrame + 1) % 4; b.animTimer = 0; }

      // Platform landing — also tilt barrel with platform
      if (b.vy >= 0) {
        const res = getPlatformBelow(b.x, b.y + 12, 16);
        if (res && b.y + 12 <= res.sy + b.vy + 2) {
          b.y = res.sy - 12;
          b.vy = 0;
          b.onGround = true;
          // Adjust horizontal direction from slant
          const tiltBoost = res.plat.slant * 80;
          b.vx = b.vx > 0
            ? Math.abs(1.8 + level * 0.3 + tiltBoost)
            : -Math.abs(1.8 + level * 0.3 - tiltBoost);
        }
      }

      // Bounce off walls
      if (b.x < 0)      { b.x = 0;      b.vx = Math.abs(b.vx); }
      if (b.x + 16 > W) { b.x = W - 16; b.vx = -Math.abs(b.vx); }

      // Remove if fallen off bottom
      if (b.y > H + 60) {
        barrels.splice(i, 1);
        score += 10;
        updateHUD();
      }
    }
  }

  function spawnBarrels() {
    barrelTimer--;
    if (barrelTimer <= 0) {
      spawnBarrel();
      const minInterval = Math.max(60, BARREL_INTERVAL_BASE - frameCount * 0.02 - level * 20);
      barrelTimer = minInterval + Math.random() * 40;
      dk.shakeTimer = 20;
    }
  }

  function checkCollisions() {
    // Barrel hits mario
    for (const b of barrels) {
      if (rectsOverlap(mario.x, mario.y, MARIO_W, MARIO_H, b.x, b.y, 16, 12)) {
        triggerDeath();
        return;
      }
    }

    // Mario reaches princess
    if (rectsOverlap(mario.x, mario.y, MARIO_W, MARIO_H,
                     princess.x - 14, princess.y - 30, 28, 30)) {
      state = 'win';
      score += 500 + level * 200;
      updateHUD();
      document.getElementById('message').textContent =
        level < 3 ? `LEVEL ${level} CLEAR! +${500 + level*200}pts  ENTER→NEXT` : 'YOU WIN!! 🎉 ENTER TO PLAY AGAIN';
    }
  }

  function triggerDeath() {
    mario.dead = true;
    mario.deathTimer = 0;
    mario.vx = 0;
    mario.vy = -5;
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  // ── Drawing helpers ───────────────────────────────────────────────

  function drawPlatforms() {
    for (const p of platforms) {
      // Shadow
      ctx.fillStyle = '#4a2a0a';
      ctx.fillRect(p.x + 3, p.y + 10, p.w, 14);

      // Draw slanted platform as a polygon
      const leftY  = platY(p, p.x);
      const rightY = platY(p, p.x + p.w);
      ctx.fillStyle = C.platform;
      ctx.beginPath();
      ctx.moveTo(p.x,        leftY);
      ctx.lineTo(p.x + p.w,  rightY);
      ctx.lineTo(p.x + p.w,  rightY + 14);
      ctx.lineTo(p.x,        leftY  + 14);
      ctx.closePath();
      ctx.fill();

      // Top stripe
      ctx.strokeStyle = C.platTop;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(p.x,       leftY);
      ctx.lineTo(p.x + p.w, rightY);
      ctx.stroke();
    }
  }

  function drawLadders() {
    for (const lad of ladders) {
      const lx = lad.x;
      ctx.fillStyle = C.ladder;
      // Side rails
      ctx.fillRect(lx - 4, lad.yTop, 3, lad.yBot - lad.yTop);
      ctx.fillRect(lx + 1, lad.yTop, 3, lad.yBot - lad.yTop);
      // Rungs
      ctx.fillStyle = C.ladderRung;
      for (let ry = lad.yTop + 8; ry < lad.yBot; ry += 14) {
        ctx.fillRect(lx - 4, ry, 8, 3);
      }
    }
  }

  function drawMario() {
    const x = Math.round(mario.x);
    const y = Math.round(mario.y);
    const f = mario.facingRight ? 1 : -1;

    ctx.save();
    ctx.translate(x + MARIO_W / 2, y);
    ctx.scale(f, 1);

    if (mario.dead) {
      // Spinning star effect
      const a = mario.deathTimer * 0.2;
      ctx.rotate(a);
      ctx.fillStyle = '#FFD700';
      for (let i = 0; i < 8; i++) {
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(i * Math.PI / 4) * 14, Math.sin(i * Math.PI / 4) * 14);
        ctx.strokeStyle = i % 2 === 0 ? '#FF4500' : '#FFD700';
        ctx.lineWidth = 3;
        ctx.stroke();
      }
      ctx.restore();
      return;
    }

    const frame = mario.animFrame;

    // Cap
    ctx.fillStyle = C.marioCap;
    ctx.fillRect(-8, 0, 16, 4);
    ctx.fillRect(-6, 4, 12, 4);

    // Face
    ctx.fillStyle = C.marioSkin;
    ctx.fillRect(-6, 8, 12, 8);

    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 9, 3, 3);

    // Mustache
    ctx.fillStyle = '#5C3317';
    ctx.fillRect(-4, 14, 10, 2);

    // Body (shirt)
    ctx.fillStyle = C.mario;
    ctx.fillRect(-8, 16, 16, 8);

    // Pants
    ctx.fillStyle = C.marioPants;
    if (frame === 1) {
      // Walk frame 1
      ctx.fillRect(-8, 24, 7, 8);
      ctx.fillRect(1,  24, 7, 8);
      ctx.fillRect(-8, 32, 5, 6);
      ctx.fillRect(3,  32, 5, 6);
    } else if (frame === 2) {
      ctx.fillRect(-8, 24, 16, 8);
      ctx.fillRect(-6, 32, 12, 5);
    } else if (frame === 3) {
      ctx.fillRect(-8, 24, 7, 8);
      ctx.fillRect(1,  24, 7, 8);
      ctx.fillRect(-5, 32, 5, 6);
      ctx.fillRect(0,  32, 5, 6);
    } else {
      // Standing
      ctx.fillRect(-8, 24, 16, 8);
      ctx.fillRect(-7, 32, 6, 5);
      ctx.fillRect(1,  32, 6, 5);
    }

    // Arms
    ctx.fillStyle = C.mario;
    ctx.fillRect(-12, 16, 4, 6);
    ctx.fillRect(8,   16, 4, 6);

    ctx.restore();
  }

  function drawDK() {
    const shake = dk.shakeTimer > 0 ? (Math.random() - 0.5) * 4 : 0;
    dk.shakeTimer = Math.max(0, dk.shakeTimer - 1);
    const x = dk.x + shake;
    const y = dk.y;

    dk.animTimer++;
    const frame = Math.floor(dk.animTimer / 12) % 2;

    ctx.save();
    ctx.translate(x + 30, y + 30);

    // Body
    ctx.fillStyle = C.dkFur;
    ctx.beginPath();
    ctx.ellipse(0, 10, 28, 30, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = C.marioSkin;
    ctx.beginPath();
    ctx.ellipse(0, 14, 16, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Head
    ctx.fillStyle = C.dkFur;
    ctx.beginPath();
    ctx.ellipse(0, -20, 20, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = C.marioSkin;
    ctx.beginPath();
    ctx.ellipse(0, -14, 12, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-7, -22, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 7, -22, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6, -23, 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8, -23, 1.5, 0, Math.PI * 2); ctx.fill();

    // Angry brow
    ctx.strokeStyle = '#2a0a00';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(-12, -28); ctx.lineTo(-2, -25);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(12, -28); ctx.lineTo(2, -25);
    ctx.stroke();

    // Mouth with teeth
    ctx.fillStyle = '#2a0a00';
    ctx.fillRect(-8, -10, 16, 5);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-6, -10, 4, 4);
    ctx.fillRect(2, -10, 4, 4);

    // Arms with barrel toss animation
    ctx.fillStyle = C.dkFur;
    const armLift = frame === 0 ? -8 : 0;
    // Left arm
    ctx.beginPath();
    ctx.ellipse(-30, -5 + armLift, 10, 22, -0.3, 0, Math.PI * 2);
    ctx.fill();
    // Right arm
    ctx.beginPath();
    ctx.ellipse(30, -5, 10, 22, 0.3, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  function drawBarrel(b) {
    const x = Math.round(b.x);
    const y = Math.round(b.y);
    const angle = b.animFrame * Math.PI / 2;

    ctx.save();
    ctx.translate(x + 8, y + 6);
    ctx.rotate(angle * (b.vx > 0 ? 1 : -1));

    // Barrel body
    ctx.fillStyle = C.barrel;
    ctx.beginPath();
    ctx.ellipse(0, 0, 8, 10, 0, 0, Math.PI * 2);
    ctx.fill();

    // Metal bands
    ctx.strokeStyle = C.barrelBand;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(0, -3, 8, 3, 0, 0, Math.PI * 2); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(0,  3, 8, 3, 0, 0, Math.PI * 2); ctx.stroke();

    ctx.restore();
  }

  function drawPrincess() {
    const x = Math.round(princess.x);
    const y = Math.round(princess.y);

    ctx.save();
    ctx.translate(x, y);

    // Dress
    ctx.fillStyle = C.princess;
    ctx.beginPath();
    ctx.moveTo(-14, 0);
    ctx.lineTo(14, 0);
    ctx.lineTo(18, 30);
    ctx.lineTo(-18, 30);
    ctx.closePath();
    ctx.fill();

    // Body
    ctx.fillStyle = '#FFB6C1';
    ctx.fillRect(-8, -20, 16, 22);

    // Head
    ctx.fillStyle = C.marioSkin;
    ctx.beginPath();
    ctx.arc(0, -28, 10, 0, Math.PI * 2);
    ctx.fill();

    // Hair
    ctx.fillStyle = '#FFD700';
    ctx.beginPath();
    ctx.arc(0, -32, 11, Math.PI, 0);
    ctx.fill();
    ctx.fillRect(-11, -32, 5, 12);
    ctx.fillRect(6, -32, 5, 12);

    // Heart above
    const pulse = 0.9 + Math.sin(frameCount * 0.08) * 0.15;
    ctx.save();
    ctx.translate(0, -52);
    ctx.scale(pulse, pulse);
    ctx.fillStyle = C.heart;
    ctx.beginPath();
    ctx.moveTo(0, 4);
    ctx.bezierCurveTo(-8, -4, -12, 4, 0, 10);
    ctx.bezierCurveTo(12, 4, 8, -4, 0, 4);
    ctx.fill();
    ctx.restore();

    ctx.restore();
  }

  function drawBackground() {
    // Gradient sky
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0d0d2b');
    grad.addColorStop(1, '#1a1a3e');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    for (let i = 0; i < 30; i++) {
      const sx = ((i * 137 + 50) % W);
      const sy = ((i * 97  + 20) % (H / 2));
      const blink = Math.sin(frameCount * 0.05 + i) > 0.7;
      if (blink) {
        ctx.fillRect(sx, sy, 2, 2);
      }
    }
  }

  function drawTitle() {
    ctx.fillStyle = '#0d0d1a';
    ctx.fillRect(0, 0, W, H);

    // Title
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 54px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('DONKEY', W/2, 160);
    ctx.fillText('KONG', W/2, 220);

    ctx.fillStyle = '#FF4500';
    ctx.font = 'bold 20px Courier New';
    ctx.fillText('~ ARCADE CLASSIC ~', W/2, 260);

    // Draw mini DK
    dk = { x: W/2 - 60, y: 280, animTimer: frameCount, shakeTimer: 0 };
    drawDK();

    ctx.fillStyle = '#fff';
    ctx.font = '18px Courier New';
    ctx.fillText('PRESS ENTER TO PLAY', W/2, 440);
    ctx.fillText('ARROW KEYS / WASD + SPACE to jump', W/2, 470);
    ctx.textAlign = 'left';
  }

  // ── Main render ──────────────────────────────────────────────────
  function draw() {
    if (state === 'title') {
      drawTitle();
      return;
    }

    ctx.clearRect(0, 0, W, H);
    drawBackground();
    drawPlatforms();
    drawLadders();
    drawDK();
    drawPrincess();

    for (const b of barrels) drawBarrel(b);

    drawMario();

    // Score popup when barrel cleared
  }

  // ── Game loop ────────────────────────────────────────────────────
  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // Start with title
  state = 'title';
  document.getElementById('message').textContent = '';
  loop();
  </script>
</body>
</html>
